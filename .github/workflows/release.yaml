name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
      - 'develop'
  workflow_dispatch:
    inputs:
      build_runtime:
        description: 'Force build and push runtime image (skip change detection)'
        type: boolean
        default: false

env:
  APP_NAME: api
  TAG_PREFIX: geniro
  NODE_VERSION: 22
  DOCKER_IMAGE: docker.io/razumru/geniro-api
  RUNTIME_IMAGE: docker.io/razumru/geniro-runtime

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-22.04
    name: Version packages
    outputs:
      release_created: ${{ steps.semantic.outputs.release_created }}
      api_released: ${{ steps.semantic.outputs.api_released }}
      web_released: ${{ steps.semantic.outputs.web_released }}
    steps:
      - uses: tibdex/github-app-token@v2
        id: generate_token
        with:
          app_id: ${{ secrets.BOT_APPLICATION_ID }}
          private_key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Prepare repository
        run: |
          git config user.email "ci@geniro.ai"
          git config user.name "Geniro Bot"

      - name: up version
        id: semantic
        run: |
          # Version API
          OUTPUT_API=$(pnpm run up-versions)
          echo "$OUTPUT_API"

          # Version Web
          OUTPUT_WEB=$(APP_NAME=web pnpm run up-versions)
          echo "$OUTPUT_WEB"

          API_RELEASED=true
          WEB_RELEASED=true

          if echo "$OUTPUT_API" | grep -q "no new version is released"; then
            API_RELEASED=false
          fi
          if echo "$OUTPUT_WEB" | grep -q "no new version is released"; then
            WEB_RELEASED=false
          fi

          echo "api_released=$API_RELEASED" >> $GITHUB_OUTPUT
          echo "web_released=$WEB_RELEASED" >> $GITHUB_OUTPUT

          if [[ "$API_RELEASED" == "false" && "$WEB_RELEASED" == "false" ]]; then
            echo "release_created=false" >> $GITHUB_OUTPUT
          else
            echo "release_created=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}

  create-release-api:
    runs-on: ubuntu-22.04
    name: Create API Release
    needs: [version]
    if: ${{ needs.version.outputs.api_released == 'true' && github.ref_name == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get API version tags
        id: tags
        run: |
          git fetch --tags --force --prune

          PATTERN="@${{ env.TAG_PREFIX }}/${{ env.APP_NAME }}@*"
          TAGS="$(git tag --merged HEAD --list "$PATTERN" | sort -V)"
          CURRENT_TAG="$(echo "$TAGS" | tail -n 1)"
          PREV_TAG="$(echo "$TAGS" | tail -n 2 | head -n 1)"
          VERSION="${CURRENT_TAG##*@}"

          if [[ -z "$VERSION" ]]; then
            echo "No API tag found, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.tags.outputs.skip != 'true'
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.tags.outputs.current_tag }} --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        if: steps.tags.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.current_tag }}
          name: "geniro-api v${{ steps.tags.outputs.version }}"
          body_path: CHANGES.md
          generate_release_notes: false

  create-release-web:
    runs-on: ubuntu-22.04
    name: Create Web Release
    needs: [version]
    if: ${{ needs.version.outputs.web_released == 'true' && github.ref_name == 'main' }}
    env:
      WEB_APP_NAME: web
      WEB_TAG_PREFIX: geniro
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Web version tags
        id: tags
        run: |
          git fetch --tags --force --prune

          PATTERN="@${{ env.WEB_TAG_PREFIX }}/${{ env.WEB_APP_NAME }}@*"
          TAGS="$(git tag --merged HEAD --list "$PATTERN" | sort -V)"
          CURRENT_TAG="$(echo "$TAGS" | tail -n 1)"
          PREV_TAG="$(echo "$TAGS" | tail -n 2 | head -n 1)"
          VERSION="${CURRENT_TAG##*@}"

          if [[ -z "$VERSION" ]]; then
            echo "No Web tag found, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.tags.outputs.skip != 'true'
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.tags.outputs.current_tag }} --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        if: steps.tags.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.current_tag }}
          name: "geniro-web v${{ steps.tags.outputs.version }}"
          body_path: CHANGES.md
          generate_release_notes: false

  build-and-push:
    runs-on: ubuntu-22.04
    name: Build And Push
    needs: [version]
    if: ${{ !contains(needs.version.result, 'failure') && needs.version.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          git fetch --tags --force --prune

          PATTERN="@${{ env.TAG_PREFIX }}/${{ env.APP_NAME }}@*"
          LAST_TAG="$(git tag --merged HEAD --list "$PATTERN" | sort -V | tail -n 1)"
          TAG="${LAST_TAG##*@}"
          if [[ -z "$TAG" ]]; then TAG="0.0.0"; fi

          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            VERSION_POSTFIX="latest"
          else
            VERSION_POSTFIX="develop"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_postfix=$VERSION_POSTFIX" >> "$GITHUB_OUTPUT"
          echo "final_tag=$TAG-$VERSION_POSTFIX" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./apps/${{ env.APP_NAME }}/Dockerfile"
          push: true
          provenance: false
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version_postfix }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.final_tag }}

  build-and-push-web:
    runs-on: ubuntu-22.04
    name: Build And Push Web
    needs: [version]
    if: ${{ !contains(needs.version.result, 'failure') && needs.version.outputs.release_created == 'true' }}
    env:
      WEB_APP_NAME: web
      WEB_DOCKER_IMAGE: docker.io/razumru/geniro-web
      WEB_TAG_PREFIX: geniro
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          git fetch --tags --force --prune

          PATTERN="@${{ env.WEB_TAG_PREFIX }}/${{ env.WEB_APP_NAME }}@*"
          LAST_TAG="$(git tag --merged HEAD --list "$PATTERN" | sort -V | tail -n 1)"
          TAG="${LAST_TAG##*@}"
          if [[ -z "$TAG" ]]; then TAG="0.0.0"; fi

          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            VERSION_POSTFIX="latest"
          else
            VERSION_POSTFIX="develop"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_postfix=$VERSION_POSTFIX" >> "$GITHUB_OUTPUT"
          echo "final_tag=$TAG-$VERSION_POSTFIX" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./apps/${{ env.WEB_APP_NAME }}/Dockerfile"
          push: true
          provenance: false
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.WEB_DOCKER_IMAGE }}:${{ steps.version.outputs.version_postfix }}
            ${{ env.WEB_DOCKER_IMAGE }}:${{ steps.version.outputs.final_tag }}

  build-and-push-runtime:
    runs-on: ubuntu-22.04
    name: Build And Push Runtime
    needs: [version]
    if: ${{ inputs.build_runtime == true || (!contains(needs.version.result, 'failure') && needs.version.outputs.release_created == 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Check runtime changes
        id: changes
        run: |
          if [[ "${{ inputs.build_runtime }}" == "true" ]]; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --force --prune

          PATTERN="@${{ env.TAG_PREFIX }}/${{ env.APP_NAME }}@*"
          # The version job just created a new tag on HEAD, so LAST_TAG == HEAD.
          # We need the PREVIOUS tag to detect changes introduced in this release.
          TAGS="$(git tag --merged HEAD --list "$PATTERN" | sort -V)"
          PREV_TAG="$(echo "$TAGS" | tail -n 2 | head -n 1)"
          LAST_TAG="$(echo "$TAGS" | tail -n 1)"

          if [[ -z "$LAST_TAG" ]] || [[ "$PREV_TAG" == "$LAST_TAG" ]]; then
            # No previous tag to compare against — treat as changed
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$PREV_TAG".."$LAST_TAG" -- apps/api/runtime.Dockerfile apps/api/scripts/ | grep -q .; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version
        if: steps.changes.outputs.runtime_changed == 'true'
        id: version
        run: |
          git fetch --tags --force --prune

          PATTERN="@${{ env.TAG_PREFIX }}/${{ env.APP_NAME }}@*"
          LAST_TAG="$(git tag --merged HEAD --list "$PATTERN" | sort -V | tail -n 1)"
          TAG="${LAST_TAG##*@}"
          if [[ -z "$TAG" ]]; then TAG="0.0.0"; fi

          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            VERSION_POSTFIX="latest"
          else
            VERSION_POSTFIX="develop"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_postfix=$VERSION_POSTFIX" >> "$GITHUB_OUTPUT"
          echo "final_tag=$TAG-$VERSION_POSTFIX" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.changes.outputs.runtime_changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changes.outputs.runtime_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changes.outputs.runtime_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push Runtime
        if: steps.changes.outputs.runtime_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: "./apps/${{ env.APP_NAME }}"
          file: "./apps/${{ env.APP_NAME }}/runtime.Dockerfile"
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.RUNTIME_IMAGE }}:${{ steps.version.outputs.version_postfix }}
            ${{ env.RUNTIME_IMAGE }}:${{ steps.version.outputs.final_tag }}
