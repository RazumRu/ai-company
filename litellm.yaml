general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  forward_client_headers_to_llm_api: true

litellm_settings:
  proxy_logging: false
  success_logging: true
  drop_params: true
  # Inject cost into usage.cost on streaming chunks so clients reading the JSON
  # body (not just the x-litellm-response-cost header) get per-request pricing.
  # Without this flag, models like openai/gpt-5.4-mini that LiteLLM auto-routes
  # via DB-stored deployment groups still get a computed cost (visible in the
  # x-litellm-response-cost header) but no usage.cost field on streaming chunks,
  # so downstream consumers that only parse the JSON body see $0.
  include_cost_in_streaming_usage: true

model_list:
  # OpenRouter provider — OpenAI
  # Pricing in LiteLLM DB: gpt-5-mini ✓, gpt-5.2-codex ✓, gpt-5.2 ✓, gpt-5.4 ?, gpt-5.4-codex ?
  - model_name: text-embedding-3-small
    litellm_params:
      model: openrouter/openai/text-embedding-3-small
      api_key: os.environ/OPENROUTER_API_KEY
      drop_params: true
      additional_drop_params: [ "stop" ]
    model_info:
      base_model: text-embedding-3-small  # map pricing from LiteLLM DB

  - model_name: gpt-5-mini
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY
      drop_params: true
      additional_drop_params: [ "stop" ]

  - model_name: gpt-5.2-codex
    litellm_params:
      model: openrouter/openai/gpt-5.2-codex
      api_key: os.environ/OPENROUTER_API_KEY
      drop_params: true
      additional_drop_params: [ "stop" ]

  - model_name: gpt-5.4
    litellm_params:
      model: openrouter/openai/gpt-5.4
      api_key: os.environ/OPENROUTER_API_KEY
      drop_params: true
      additional_drop_params: [ "stop" ]

  # OpenRouter provider — MiniMax
  - model_name: openrouter/minimax-m2.5
    litellm_params:
      model: openrouter/minimax/minimax-m2.5
      api_key: os.environ/OPENROUTER_API_KEY
      drop_params: true
    model_info:
      base_model: minimax/MiniMax-M2.5    # map pricing from LiteLLM DB
