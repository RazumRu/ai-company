upstream runner_backend {
    server daytona-runner:8080;
}

server {
    listen 80;

    # Rewrite SDK toolbox URLs to match the runner's route pattern
    # and replace the user API key with the runner's API key.
    #
    # SDK sends:      /toolbox/<sandboxId>/<path>   with Bearer <admin-api-key>
    # Runner expects: /sandboxes/<sandboxId>/toolbox/<path>  with Bearer <runner-api-key>
    #
    # The regex captures:
    #   $1 = sandboxId (UUID)
    #   $2 = remaining path (e.g. process/execute)
    location ~ ^/toolbox/([^/]+)/(.*)$ {
        proxy_pass http://runner_backend/sandboxes/$1/toolbox/$2$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer geniro-dev-runner-key";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Support large request bodies (file uploads)
        client_max_body_size 200m;
    }
}
