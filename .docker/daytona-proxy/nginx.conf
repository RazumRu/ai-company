server {
    listen 80;

    # DNS resolver is injected at container startup from /etc/resolv.conf
    # by the docker-compose command — see daytona-proxy in docker-compose.yml.
    # This allows dynamic re-resolution so 502s don't occur when the runner
    # container is restarted and its IP changes.
    resolver __RESOLVER__ valid=10s ipv6=off;

    # Rewrite SDK toolbox URLs to match the runner's route pattern
    # and replace the user API key with the runner's API key.
    #
    # SDK sends:      /toolbox/<sandboxId>/<path>   with Bearer <admin-api-key>
    # Runner expects: /sandboxes/<sandboxId>/toolbox/<path>  with Bearer <runner-api-key>
    #
    # The regex captures:
    #   $1 = sandboxId (UUID)
    #   $2 = remaining path (e.g. process/execute)
    location ~ ^/toolbox/([^/]+)/(.*)$ {
        # Must use a variable for proxy_pass when using the resolver directive,
        # otherwise nginx still resolves the hostname at startup.
        set $runner_upstream http://daytona-runner:8080;
        proxy_pass $runner_upstream/sandboxes/$1/toolbox/$2$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer geniro-dev-runner-key";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # WebSocket upgrade support — required by the Daytona SDK for
        # getSessionCommandLogs (log streaming) and PTY connections.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Support large request bodies (file uploads)
        client_max_body_size 200m;
    }
}
