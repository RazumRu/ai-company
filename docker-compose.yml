services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    entrypoint: ["litellm"]
    command: ["--config=/app/config.yaml","--detailed_debug"]
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PORT: 4000
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/litellm"
      LITELLM_MASTER_KEY: master
      LITELLM_SALT_KEY: salt
      OLLAMA_API_BASE: "http://host.docker.internal:11434"
    ports:
      - "4000:4000"
    networks:
      - ai
    volumes:
      - ./litellm.yaml:/app/config.yaml

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DATABASES=geniro,keycloak,litellm,infisical,daytona,zitadel
    networks:
      - ai
    ports:
      - "5439:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./.docker/postgres:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:24.0.5
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=password
      - KC_HOSTNAME=localhost
      - KC_DB=postgres
      - KC_DB_PASSWORD=postgres
      - KC_DB_USERNAME=postgres
      - KC_HEALTH_ENABLED=true
      - KC_DB_URL=jdbc:postgresql://postgres/keycloak
      - KC_FEATURES=account-api,account3,admin-api,admin-fine-grained-authz,admin2,authorization,client-policies,client-secret-rotation,dynamic-scopes,step-up-authentication,token-exchange,transient-users,update-email,web-authn
    networks:
      - ai
    ports:
      - "8082:8080"
    command: "start-dev --import-realm"
    volumes:
      - ./.docker/keycloak:/opt/keycloak/data/import
      - ./.docker/keycloak/themes/geniro:/opt/keycloak/themes/geniro:ro

  redis:
    image: redis:7-alpine
    command: [ "redis-server","--appendonly","yes","--appendfsync","everysec" ]
    restart: unless-stopped
    networks:
      - ai
    ports:
      - "6380:6379"
    volumes:
      - redis:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    networks:
      - ai
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant:/qdrant/storage

  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    restart: unless-stopped
    networks:
      - ai
    ports:
      - "8317:8317"
    volumes:
      - ./cliproxy.yaml:/CLIProxyAPI/config.yaml
      - cliproxy-auth:/root/.cli-proxy-api

  registry-mirror:
    image: registry:2
    restart: unless-stopped
    networks:
      ai:
      daytona:
        aliases:
          - daytona-registry
    ports:
      - "5009:5000"
    volumes:
      - registry:/var/lib/registry
      - ./.docker/registry/config.yml:/etc/docker/registry/config.yml:ro

  daytona-proxy:
    image: nginx:alpine
    profiles: ["daytona"]
    networks:
      - daytona
    depends_on:
      - daytona-runner
    ports:
      - "3987:80"
    # Read the container's DNS nameserver at startup and substitute it into the
    # nginx config so upstream hostnames are re-resolved on every request.
    # This prevents stale-IP 502s when the runner container is restarted.
    command: >
      /bin/sh -c "
        RESOLVER=$$(awk '/^nameserver/{print $$2; exit}' /etc/resolv.conf) &&
        sed \"s/__RESOLVER__/$$RESOLVER/g\" /etc/nginx/conf.d/default.conf.tmpl > /etc/nginx/conf.d/default.conf &&
        exec nginx -g 'daemon off;'
      "
    volumes:
      - ./.docker/daytona-proxy/nginx.conf:/etc/nginx/conf.d/default.conf.tmpl:ro

  daytona-api:
    image: daytonaio/daytona-api:v0.160.0
    restart: on-failure
    profiles: ["daytona"]
    networks:
      - daytona
      - geniro-infra
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3986/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      - PORT=3986
      # Database (shared geniro_ai network — access via container name)
      - DB_HOST=geniro-postgres-1
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=daytona
      # Redis (shared geniro_ai network)
      - REDIS_HOST=geniro-redis-1
      - REDIS_PORT=6379
      # Encryption (dev-only keys)
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
      - ENCRYPTION_SALT=fedcba9876543210fedcba9876543210
      # OIDC (shared geniro_ai network — Keycloak listens on 8080 internally)
      - OIDC_ISSUER_BASE_URL=http://geniro-keycloak-1:8080/realms/geniro
      - OIDC_AUDIENCE=account
      - OIDC_CLIENT_ID=geniro
      # App config
      - ENVIRONMENT=development
      - RUN_MIGRATIONS=true
      - NODE_ENV=development
      - DASHBOARD_URL=http://localhost:3986
      - DISABLE_CRON_JOBS=false
      # Admin API key for bootstrapping (value used as the literal API key)
      - ADMIN_API_KEY=geniro-dev-admin-key
      # SSH Gateway (dummy values for dev)
      - SSH_GATEWAY_URL=http://localhost:9999
      - SSH_GATEWAY_API_KEY=geniro-dev-ssh-key
      - SSH_GATEWAY_PUBLIC_KEY=dummy
      - SSH_GATEWAY_COMMAND=dummy
      # Default snapshot (must include tag)
      - DEFAULT_SNAPSHOT=razumru/geniro:latest
      # Proxy config (dummy for dev)
      - PROXY_API_KEY=geniro-dev-proxy-key
      - PROXY_DOMAIN=localhost
      - PROXY_PROTOCOL=http
      - PROXY_TEMPLATE_URL=http://localhost
      - PROXY_TOOLBOX_BASE_URL=http://localhost:3987
      # Default runner config — v2 runner (runner registers itself via polling)
      - DEFAULT_RUNNER_API_KEY=geniro-dev-runner-key
      - DEFAULT_RUNNER_NAME=local
      - DEFAULT_RUNNER_API_VERSION=2
      - DEFAULT_REGION_ID=us
      - DEFAULT_REGION_NAME=us
      # Admin org quotas (high values for dev environment)
      - ADMIN_MAX_CPU_PER_SANDBOX=4
      - ADMIN_MAX_MEMORY_PER_SANDBOX=8
      - ADMIN_MAX_DISK_PER_SANDBOX=50
      - ADMIN_TOTAL_CPU_QUOTA=100
      - ADMIN_TOTAL_MEMORY_QUOTA=100
      - ADMIN_TOTAL_DISK_QUOTA=200
      # Transient registry (uses the local registry-mirror for snapshot storage)
      - TRANSIENT_REGISTRY_URL=http://geniro-registry-mirror-1:5000
      - TRANSIENT_REGISTRY_ADMIN=admin
      - TRANSIENT_REGISTRY_PASSWORD=admin
      - TRANSIENT_REGISTRY_PROJECT_ID=geniro
      # Logging
      - LOG_LEVEL=debug
    ports:
      - "3986:3986"

  daytona-runner:
    image: daytonaio/daytona-runner:v0.160.0
    restart: on-failure
    privileged: true
    profiles: ["daytona"]
    networks:
      - daytona
      - geniro-infra
    depends_on:
      - daytona-api
    environment:
      - DAYTONA_API_URL=http://daytona-api:3986/api
      - DAYTONA_RUNNER_TOKEN=geniro-dev-runner-key
      - API_PORT=8080
      - API_VERSION=2
      - RUNNER_DOMAIN=runner
      - LOG_LEVEL=debug
      - DAEMON_START_TIMEOUT_SEC=120
      - SANDBOX_START_TIMEOUT_SEC=120
      - RESOURCE_LIMITS_DISABLED=true
    entrypoint: ["/bin/sh", "/opt/entrypoint-wrapper.sh"]
    healthcheck:
      # Check both runner HTTP server AND Docker daemon readiness.
      # Without the docker info check, the runner reports healthy before it can run sandboxes.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ && docker info >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    ports:
      - "8080:8080"
    volumes:
      - ./.docker/daytona-runner/daemon.json:/etc/docker/daemon.json:ro
      - ./.docker/daytona-runner/entrypoint-wrapper.sh:/opt/entrypoint-wrapper.sh:ro
      - ./.docker/daytona-runner/docker-socket-proxy.bin:/opt/docker-socket-proxy:ro

  openbao:
    image: openbao/openbao:latest
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    networks:
      - ai
    ports:
      - "8200:8200"
    volumes:
      - openbao_data:/openbao/file
      - openbao_data:/openbao/init
      - ./.docker/openbao/openbao-config.hcl:/openbao/config/openbao-config.hcl:ro
      - ./.docker/openbao/entrypoint.sh:/openbao/scripts/entrypoint.sh:ro
    entrypoint: ["sh", "/openbao/scripts/entrypoint.sh"]
    environment:
      - BAO_ADDR=http://127.0.0.1:8200
    healthcheck:
      test: ["CMD-SHELL", "bao status > /dev/null 2>&1; [ $? -le 1 ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  zitadel:
    image: ghcr.io/zitadel/zitadel:v3.4.7
    profiles: ["zitadel"]
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: "MasterkeyNeedsToHave32Characters"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8085
      ZITADEL_EXTERNALDOMAIN: "localhost"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_NAME: "Geniro"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: "zitadel-admin@geniro.localhost"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Password1!"
      # Machine user + PAT for automated init script
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: "geniro-init-sa"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: "Geniro Init Service Account"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: "/zitadel-init/pat.txt"
    volumes:
      - zitadel-init-data:/zitadel-init:rw
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  zitadel-init:
    image: alpine/curl:latest
    profiles: ["zitadel"]
    depends_on:
      zitadel:
        condition: service_healthy
    networks:
      - ai
    volumes:
      - ./.docker/zitadel:/scripts:ro
      - zitadel-init-data:/zitadel-init:ro
      - ./.docker/zitadel/data:/zitadel-output:rw
    entrypoint: ["sh", "/scripts/init.sh"]
    restart: "no"

networks:
  ai:
    driver: bridge
  daytona:
    driver: bridge
  geniro-infra:
    external: true
    name: geniro_ai

volumes:
  postgres:
  redis:
  qdrant:
  registry:
  cliproxy-auth:
  zitadel-init-data:
  openbao_data:
